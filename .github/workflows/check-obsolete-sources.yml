name: "Check archived and obsolete sources"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-files:
    name: "Run sync"
    runs-on: ubuntu-latest

    outputs:
      message: ${{ steps.commit_message.outputs.message }}

    strategy:
      fail-fast: false
      matrix:
        check_type:
          - archived
          - obsolete

    steps:
      - name: "Checkout source repository"
        uses: actions/checkout@v6

      - name: "Get commit message"
        id: commit_message
        run: |
          COMMIT_MESSAGE="Update list of archived and obsolete sources"
          echo "message=$COMMIT_MESSAGE" >> "$GITHUB_OUTPUT"

      - name: "Run ${{ matrix.check_type }} check"
        shell: bash
        run: |
          set -euo pipefail

          cd programs

          obsolescence_threshold=$(date -u -d "1 year ago" +"%Y")
          tmp_file=$(mktemp)

          if [[ "${{ matrix.check_type }}" == "archived" ]]; then
            echo "Determine archived repositories"

            for arg in x86_64/*; do
              if grep -q "^version=.*api.github.com" "$arg" && grep -q "^SITE=" "$arg"; then
                (
                  user_repo=$(grep "^SITE=" "$arg" | head -1 | awk -F'"' '/^SITE=/{print $2}')

                  if curl -fsS "https://api.gh.pkgforge.dev/repos/$user_repo" \
                    | grep -q '"archived".*true,'; then
                    basename "$arg" >> "$tmp_file"
                  fi
                ) &
              fi
            done

            wait

            {
              echo "# ARCHIVED SOURCES"
              sort -u "$tmp_file"
            } > archived-apps

          else
            echo "Determine obsolete repositories"

            for arg in x86_64/*; do
              if grep -q "^version=.*api.github.com.*/releases" "$arg" && grep -q "^SITE=" "$arg"; then
                (
                  user_repo=$(grep "^SITE=" "$arg" | head -1 | awk -F'"' '/^SITE=/{print $2}')

                  release_year=$(
                    curl -fsS "https://api.gh.pkgforge.dev/repos/$user_repo/releases" \
                      | grep -oP '"updated_at": "\K\d{4}' \
                      | sort -n \
                      | tail -1
                  )

                  if [[ -n "${release_year:-}" ]] \
                    && [[ "$release_year" =~ ^[0-9]{4}$ ]] \
                    && (( release_year < obsolescence_threshold )); then
                    echo "$(basename "$arg") $release_year" >> "$tmp_file"
                  fi
                ) &
              fi
            done

            wait

            {
              echo "# OBSOLETE SOURCES"
              sort -u "$tmp_file"
            } > obsolete-apps
          fi

          rm -f "$tmp_file"

      - name: "Upload generated file"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.check_type }}-apps
          path: |
            programs/archived-apps
            programs/obsolete-apps
          if-no-files-found: ignore

  push-results:
    name: "Push results"
    runs-on: ubuntu-latest
    needs: sync-files

    steps:
      - name: "Checkout source repository"
        uses: actions/checkout@v6

      - name: "Download artifacts"
        uses: actions/download-artifact@v4
        with:
          path: programs/artifacts

      - name: "Restore generated files"
        shell: bash
        run: |
          set -euo pipefail

          find programs/artifacts -type f \( \
            -name "archived-apps" -o \
            -name "obsolete-apps" \
          \) -exec cp {} programs/ \;

      - name: "Push to Source"
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "web-flow"
          git config --global user.email "noreply@github.com"

          git add programs/archived-apps programs/obsolete-apps

          if git diff-index --quiet HEAD; then
            echo "No changes to commit." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Update list of archived and obsolete sources"
            git push
            echo "Sync to Source succeeded" >> "$GITHUB_STEP_SUMMARY"
          fi
