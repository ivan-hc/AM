name: "Check archived and obsolete sources"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-files:
    name: "${{ matrix.check_type }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        check_type:
          - archived
          - obsolete

    steps:
      - name: "Checkout source repository"
        uses: actions/checkout@v6

      - name: "Generate ${{ matrix.check_type }} list"
        shell: bash
        run: |
          set -euo pipefail

          cd programs

          obsolescence_threshold=$(date -u -d "1 year ago" +"%Y")
          tmp_file=$(mktemp)

          github_api() {
            local url="$1"
            local retries=5
            local delay=3
            local attempt=1

            while (( attempt <= retries )); do
              response=$(curl -fsSL \
                --connect-timeout 15 \
                --max-time 60 \
                "$url" 2>/dev/null) && {
                  echo "$response"
                  return 0
                }

              echo "Attempt ${attempt}/${retries} failed for: $url"

              sleep "$delay"
              ((attempt++))
            done

            echo "Failed after ${retries} attempts: $url"
            return 1
          }

          case "${{ matrix.check_type }}" in
            archived)
              echo "Determine archived repositories"

              for arg in x86_64/*; do
                if grep -q "^version=.*api.github.com" "$arg" && grep -q "^SITE=" "$arg"; then
                  (
                    user_repo=$(grep "^SITE=" "$arg" | head -1 | awk -F'"' '/^SITE=/{print $2}')

                    repo_data=$(github_api "https://api.gh.pkgforge.dev/repos/$user_repo") || exit 0

                    if echo "$repo_data" | grep -q '"archived".*true,'; then
                      basename "$arg" >> "$tmp_file"
                    fi
                  ) &
                fi
              done

              wait

              {
                echo "# ARCHIVED SOURCES"
                sort -u "$tmp_file"
              } > archived-apps
              ;;

            obsolete)
              echo "Determine obsolete repositories"

              for arg in x86_64/*; do
                if grep -q "^version=.*api.github.com.*/releases" "$arg" && grep -q "^SITE=" "$arg"; then
                  (
                    user_repo=$(grep "^SITE=" "$arg" | head -1 | awk -F'"' '/^SITE=/{print $2}')

                    release_data=$(github_api "https://api.gh.pkgforge.dev/repos/$user_repo/releases") || exit 0

                    release_year=$(
                      echo "$release_data" \
                        | grep -oP '"updated_at": "\K\d{4}' \
                        | sort -n \
                        | tail -1
                    )

                    if [[ -n "${release_year:-}" ]] \
                      && [[ "$release_year" =~ ^[0-9]{4}$ ]] \
                      && (( release_year < obsolescence_threshold )); then
                      echo "$(basename "$arg") $release_year" >> "$tmp_file"
                    fi
                  ) &
                fi
              done

              wait

              {
                echo "# OBSOLETE SOURCES"
                sort -u "$tmp_file"
              } > obsolete-apps
              ;;
          esac

          rm -f "$tmp_file"

      - name: "Upload generated file"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.check_type }}-apps
          path: programs/${{ matrix.check_type }}-apps

  push-results:
    name: "Push results"
    runs-on: ubuntu-latest
    needs: generate-files

    steps:
      - name: "Checkout source repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Download generated artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: "Restore generated files"
        shell: bash
        run: |
          set -euo pipefail

          cp artifacts/archived-apps/archived-apps programs/
          cp artifacts/obsolete-apps/obsolete-apps programs/

      - name: "Commit and push changes"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add programs/archived-apps programs/obsolete-apps

          if git diff-index --quiet HEAD; then
            echo "No changes to commit." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Update list of archived and obsolete sources"

            git push \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              HEAD:${GITHUB_REF_NAME}

            echo "Sync to Source succeeded" >> "$GITHUB_STEP_SUMMARY"
          fi
